<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect to root and keep the path in the hash
      const path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('/#' + path);
    </script>
  </head>
  <body></body>
</html>
