<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      const path = window.location.pathname;

      // List of paths to NOT redirect (static files, 404 page, etc.)
      const noRedirectPaths = ['/', '/404.html', '/index.html'];

      if (!noRedirectPaths.includes(path) && !path.startsWith('/assets/') && !path.includes('.')) {
        // Redirect only if the path is not root, not 404.html, not index.html,
        // not inside assets folder, and doesn't contain a dot (to avoid files like CSS, JS)
        window.location.replace('/#' + path);
      }
    </script>
  </head>
  <body></body>
</html>
